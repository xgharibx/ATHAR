  <body class="bg-[var(--bg)] text-[var(--fg)]">
    <noscript>هذا التطبيق يحتاج JavaScript ليعمل.</noscript>
    <!-- Loading screen: prevents black/white flash before React mounts (critical for Android WebView) -->
    <div id="app-loader" role="status" aria-label="جارٍ تحميل أثر…" style="
      position:fixed;inset:0;z-index:9999;
      background:#0a0c12;
      display:flex;align-items:center;justify-content:center;
      flex-direction:column;gap:16px;
      transition:opacity 0.4s ease;
    ">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="32" cy="32" r="30" stroke="#2F4F37" stroke-width="4"/>
        <circle cx="32" cy="32" r="30" stroke="#7EC8A4" stroke-width="4"
          stroke-dasharray="188" stroke-dashoffset="94"
          style="transform-origin:center;animation:spin 1.2s linear infinite;">
        </circle>
      </svg>
      <style>@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}</style>
    </div>
    <!-- Theme-aware loader: read persisted theme from localStorage before first paint -->
    <script>
    (function(){
      var THEME_BG={system:"#07080b",dark:"#07080b",light:"#f7f8ff",noor:"#07080b",midnight:"#0f172a",forest:"#022c22",bees:"#1a120b",roses:"#280a14",sapphire:"#070a1a",violet:"#12051f",sunset:"#160a06",mist:"#0b0d12"};
      try {
        var s = localStorage.getItem("noor_store_v1");
        if (s) {
          var d = JSON.parse(s);
          var t = d && d.state && d.state.prefs && d.state.prefs.theme;
          if (t === "system") {
            t = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
          }
          if (t && THEME_BG[t]) {
            var el = document.getElementById("app-loader");
            if (el) el.style.background = THEME_BG[t];
            var meta = document.querySelector('meta[name="theme-color"]');
            if (meta) meta.setAttribute("content", THEME_BG[t]);
          }
        }
      } catch(e) {}
    })();
    </script>
    <div id="root"></div>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        var observer;
        function hideLoader() {
          var loader = document.getElementById('app-loader');
          if (!loader || loader.getAttribute('data-hidden') === 'true') return;
          loader.setAttribute('data-hidden', 'true');
          loader.style.pointerEvents = 'none';
          loader.style.opacity = '0';
          setTimeout(function(){ loader.style.display='none'; }, 420);
        }
        function hideIfReactPainted() {
          var root = document.getElementById('root');
          if (root && root.children.length > 0) {
            hideLoader();
            if (observer) observer.disconnect();
            return true;
          }
          return false;
        }
        if (hideIfReactPainted()) return;
        observer = new MutationObserver(hideIfReactPainted);
        observer.observe(document.getElementById('root') || document.body, { childList: true, subtree: true });
        setTimeout(function(){ hideLoader(); if (observer) observer.disconnect(); }, 6000);
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
