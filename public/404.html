<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ATHAR</title>
    <script>
      // GitHub Pages SPA redirect — custom domain (www.athark.org) serves from root
      (function () {
        var l = window.location;
        var path = l.pathname;
        var newUrl = "/?p=" + encodeURIComponent(path + l.search + l.hash);
        l.replace(l.protocol + "//" + l.host + newUrl);
      })();
    </script>
  </head>
  <body></body>
</html>
